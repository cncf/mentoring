  # ── Term ──────────────────────────────────────────────────────────
  - type: dropdown
    id: term
    attributes:
      label: Term
      description: >
        Which term is this proposal for? All programs are full-time
        (~350 hours across the term).
      options:
        - "2026 Term 3 (Sep-Nov)"
    validations:
      required: true

  # ── Program Name ──────────────────────────────────────────────────
  - type: input
    id: program_name
    attributes:
      label: Program Name
      description: >
        The descriptive part of the program name shown on LFX. The full
        name is composed automatically as
        `CNCF - <Project>: <your program name here> (<term>)`.
        Keep it concise — available characters depend on your project
        name (typically 53-73 chars), the full program name must be < 100 characters.
      placeholder: "e.g. Add Prometheus Metrics to Control Plane Service"
    validations:
      required: true

  # ── Program Description ───────────────────────────────────────────
  - type: textarea
    id: program_description
    attributes:
      label: Program Description
      description: >
        Up to 3000 characters. This is what applicants will see on LFX.
        Cover both what the program is about and what success looks like —
        use the structure below or your own.
      placeholder: |
        ## Description
        What the program is about, the problem it solves, and the context
        a candidate needs to understand the work.

        ## Expected outcomes
        What "done" looks like at the end of the term — concrete deliverables,
        contributions, or capabilities the mentee should have produced.
    validations:
      required: true

  # ── Technologies ──────────────────────────────────────────────────
  - type: input
    id: technologies
    attributes:
      label: Technologies
      description: >
        Comma-separated list of languages, frameworks, and platforms
        relevant to this program.
      placeholder: "e.g. Go, Kubernetes, Prometheus, gRPC"
    validations:
      required: true

  # ── Skills same as Technologies? ──────────────────────────────────
  - type: checkboxes
    id: skills_same
    attributes:
      label: Skills same as Technologies?
      description: >
        Check this box if applicants need the same skills as the technologies
        listed above. Otherwise leave it unchecked and fill in the
        Required/Desirable Skills field below.
      options:
        - label: "Yes, the required skills are the same as the technologies listed above."
          required: false

  # ── Required/Desirable Skills ─────────────────────────────────────
  - type: input
    id: skills
    attributes:
      label: Required/Desirable Skills
      description: >
        Comma-separated. Only fill this in if the skills differ from the
        Technologies above (and leave the box above unchecked). For example, a
        docs program might list "technical writing, Markdown" here even
        though the technologies are "Go, Kubernetes".
      placeholder: "e.g. technical writing, Markdown, Hugo"
    validations:
      required: false

  # ── Mentors ───────────────────────────────────────────────────────
  - type: textarea
    id: mentors
    attributes:
      label: Mentors
      description: >
        One mentor per line. Format:
        `Full Name | @github-handle | email | LFID`.
        The **first line is the primary mentor**; additional lines are
        co-mentors. Use the email address tied to the mentor's LFID account on
        the LFX platform.


        The **LFID** is the mentor's LF Username: find it on
        [openprofile.dev/profile](https://openprofile.dev/profile) in the
        "Public profile URL" link, or under Settings -> Basic Information as
        "LF Username" on
        [openprofile.dev/edit/profile](https://openprofile.dev/edit/profile).


        Don't have every mentor's LFID yet? You can still create the proposal,
        then add the missing LFIDs later by editing this issue. A proposal can't
        pass validation or be added to the LFX platform until every mentor's
        LFID is present.
      placeholder: |
        Jane Doe | @janedoe | jane@example.com | janedoe
        Sam Lee  | @samlee  | sam@example.com | samlee
    validations:
      required: true

  # ── Upstream Issue URL ────────────────────────────────────────────
  - type: input
    id: upstream_issue_url
    attributes:
      label: Upstream Issue URL
      description: >
        Link to a tracking issue in the project's own repo. If the
        program covers multiple issues, create an umbrella issue and
        link that. Exactly one URL.
      placeholder: "https://github.com/org/repo/issues/1234"
    validations:
      required: true

  # ── Application Prerequisites ────────────────────────────────────
  - type: checkboxes
    id: application_prerequisites
    attributes:
      label: Application Prerequisites
      description: >
        These map directly to LFX's standard prerequisite toggles.
        Check each item applicants must complete. All checked items
        are **required** — applicants cannot submit without them.
      options:
        - label: "Resume"
          required: false
        - label: "Cover Letter"
          required: false
        - label: "School Enrollment Verification"
          required: false
        - label: "Participation Permission from school or employer"
          required: false
        - label: "Coding Challenge"
          required: false
        - label: "Custom Prerequisite (fill in details below)"
          required: false

  # ── Coding Challenge URL ──────────────────────────────────────────
  - type: input
    id: coding_challenge_url
    attributes:
      label: Coding Challenge URL
      description: >
        If you checked Coding Challenge above, provide the URL.
        Leave blank otherwise.
      placeholder: "https://example.com/challenge"
    validations:
      required: false

  # ── Custom Prerequisite Name ──────────────────────────────────────
  - type: input
    id: custom_prerequisite_name
    attributes:
      label: Custom Prerequisite Name
      description: >
        If you checked Custom Prerequisite above, provide a short name
        (max 20 characters on LFX). Leave blank otherwise.
      placeholder: "e.g. Writing Sample"
    validations:
      required: false

  # ── Custom Prerequisite Description ───────────────────────────────
  - type: textarea
    id: custom_prerequisite_description
    attributes:
      label: Custom Prerequisite Description
      description: >
        Describe what the applicant must provide (max 500 characters on
        LFX). Check the file-upload box below if the applicant needs to
        upload a file.
      placeholder: "e.g. Please upload a writing sample demonstrating your technical communication skills."
    validations:
      required: false

  # ── Custom Prerequisite — File Upload Required? ───────────────────
  - type: checkboxes
    id: custom_prerequisite_file_upload
    attributes:
      label: Custom Prerequisite — File Upload
      description: >
        Does your custom prerequisite require the mentee to upload a file?
      options:
        - label: "Yes — completion of this task requires the mentee to submit a file."
          required: false

  # ── Standard mentee prerequisite: LFC102 (informational, not an input) ──
  # LFC102 is a standing CNCF requirement injected onto every program by the
  # export from programs/lfx-mentorship/automation/lib/prerequisites.js. Surfaced
  # here so mentors know mentees will be expected to complete it; it is not a
  # field they configure.
  - type: markdown
    attributes:
      value: |
        > **Every accepted mentee must complete [Inclusive Open Source Community Orientation (LFC102)](https://training.linuxfoundation.org/training/inclusive-open-source-community-orientation-lfc102/).**
        > This is a standing CNCF requirement added to every program
        > automatically, so you do not need to configure it. Mentees
        > upload their completion certificate on the LFX platform.

