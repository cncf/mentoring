name: LFX Mentorship Program Proposal
description: Propose a mentorship program for an upcoming LFX Mentorship term.
title: "[CNCF LFX Proposal] <project> <program name>"
labels: ["lfx mentorship", "Proposal", "Needs Validation"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an LFX Mentorship program!

        **Submit one issue per program.** If you have multiple proposals,
        file multiple issues.

        Once submitted, automation will validate the fields and track the
        proposal through approvals. A CNCF program admin will review and
        approve before it's loaded into LFX.

