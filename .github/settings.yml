repository:
  # See https://developer.github.com/v3/repos/#edit for all available settings.

  # The name of the repository. Changing this will rename the repository
  name: mentoring

  # A short description of the repository that will show up on GitHub
  description: 👩🏿‍🎓👨🏽‍🎓👩🏻‍🎓CNCF Mentoring + CommunityBridge + Summer of Code

  # A URL with more information about the repository
  homepage: https://mentoring.cncf.io

labels:
  - name: lfx mentorship
    color: a2dcf2
  - name: enhancement
    color: 84b6eb
  - name: help wanted
    color: ffff54
  - name: good first issue
    color: ff8c00
  - name: hold
    color: d93f0b
  - name: time-sensitive
    description: issues or PRs that have a due date
    color: b60205
  - name: getting started
    color: 3B8924
  - name: outreachy
    color: 7fd811
  - name: summer of code
    color: 00ffff
  - name: season of docs
    color: 00ff80
  - name: spring
    color: 1ED626
  - name: "Term 1: March-May"
    color: 1ED626
  - name: summer
    color: FBCA04
  - name: "Term 3: Sept-Nov"
    color: FBCA04
  - name: fall
    color: C5DEF5
  - name: "Term 2: June-Aug"
    color: C5DEF5
  - name: '2022'
    color: 0052CC
  - name: '2023'
    color: 0052CC
  - name: '2024'
    color: 0052CC
  - name: '2025'
    color: 0052CC
  - name: '2026'
    color: 0052CC
  - name: discussion
    color: af17d7
  - name: administration
    color: e3ead3
  - name: Awaiting Mentor Confirmation
    color: E99695
  - name: Mentors Confirmed
    color: 0E8A16
  - name: Awaiting Maintainer/Contribex Approval
    color: D4C5F9
  - name: Maintainer/Contribex Approved
    color: 5319E7

  #
  # LFX program proposal intake labels
  #

  # Intake marker
  - name: Proposal
    color: 1D76DB
    description: LFX program proposal intake

  # Validation gates
  - name: Needs Validation
    color: FBCA04
    description: Awaiting format validation
  - name: Validation Passed
    color: 0E8A16
    description: Format validation passed
  - name: Validation Failed
    color: B60205
    description: Format validation failed

  # CNCF admin gate
  - name: Awaiting CNCF Admin Approval
    color: FBCA04
    description: Needs /cncf-approve from admin
  - name: CNCF Approved
    color: 0E8A16
    description: CNCF admin approved

  # Post-approval lifecycle
  - name: Posted to LFX
    color: 0E8A16
    description: Program exported to LFX platform
  - name: LFX Approved
    color: 0E8A16
    description: LFX platform approved the program
  - name: Mentors Registered
    color: 0E8A16
    description: Mentors added on LFX platform
  - name: Open for Applications
    color: 0E8A16
    description: LFX applications are open
  - name: Applications Closed
    color: 5319E7
    description: LFX applications closed

  # Soft signal
  - name: Over Quota
    color: E4E669
    description: Project exceeds per-term proposal quota


  # end of labels
