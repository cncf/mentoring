name: LFX Proposal Validation

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write
  contents: read

jobs:
  validate:
    # Cheap pre-filter only: run when the issue already carries the identifying
    # labels, OR its title looks like a proposal and the body carries at least
    # the first form heading. GitHub only applies a template's `labels:` for
    # authors with triage access, so read-only proposers' issues arrive
    # unlabeled — the title branch lets those reach the steps. This gate is
    # deliberately loose (startsWith/contains are case-insensitive substring
    # matches); the Bootstrap and Validate steps re-check authoritatively with
    # looksLikeProposalForm() before mutating labels or commenting.
    if: >-
      (contains(github.event.issue.labels.*.name, 'lfx mentorship')
       && contains(github.event.issue.labels.*.name, 'Proposal'))
      || (startsWith(github.event.issue.title, '[CNCF LFX Proposal]')
          && contains(github.event.issue.body, '### CNCF Project'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        # lib/authorize.js -> lib/maintainers.js parses .project/maintainers.yaml
        # with js-yaml (proposer-implied maintainer approval). --ignore-scripts
        # blocks dependency lifecycle scripts (js-yaml needs none).
        working-directory: programs/lfx-mentorship/automation
        run: npm install --no-save --ignore-scripts js-yaml@4.3.0

      - name: Bootstrap proposal labels
        uses: actions/github-script@v7
        with:
          script: |
            const path = require('path');
            const _lib = (m) => require(path.join(process.env.GITHUB_WORKSPACE || process.cwd(), 'programs/lfx-mentorship/automation/lib', m));
            const { PROPOSAL_LABELS, isProposalTitle, looksLikeProposalForm, missingLabels } = _lib('labels.js');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const title = context.payload.issue.title || '';
            const body = context.payload.issue.body || '';

            // GitHub silently drops issue-template labels for authors without
            // triage access, so proposals from read-only project maintainers
            // land unlabeled and every label-gated proposal workflow skips.
            // Re-apply the identifying labels here so validation (below), the
            // board sync step, and the approvals workflow can key off them.
            // Require the exact proposal title AND the full issue-form body
            // before applying the (token-unlocking) labels. This is stricter
            // than the lenient job gate — the authoritative check lives here, in
            // a unit-tested helper.
            if (!isProposalTitle(title) || !looksLikeProposalForm(body)) return;

            const current = (context.payload.issue.labels || []).map((l) => l.name);
            const toAdd = missingLabels(current, PROPOSAL_LABELS);
            if (toAdd.length) {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: toAdd });
              core.info(`Bootstrapped proposal labels: ${toAdd.join(', ')}`);
            }

      - name: Validate proposal
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const _lib = (m) => require(path.join(process.env.GITHUB_WORKSPACE || process.cwd(), 'programs/lfx-mentorship/automation/lib', m));
            const { parseIssueForm, parseMentors, formFieldsChanged } = _lib('parse.js');
            const { validateMentors, validateUpstreamUrl, mentorCountWarning } = _lib('validate.js');
            const { lookupProject } = _lib('projects.js');
            const { isProposalTitle, looksLikeProposalForm } = _lib('labels.js');
            const { resolveProjectMaintainer } = _lib('authorize.js');
            const { computeConfirm } = _lib('confirm.js');
            const { gateLabelChanges } = _lib('gates.js');
            const { findRecordedApprovers } = _lib('approvals.js');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const title = context.payload.issue.title || '';
            const body = context.payload.issue.body || '';

            // ── Only validate genuine proposals ──
            // The job gate is a lenient pre-filter (case-insensitive title +
            // a single-heading substring), so re-check authoritatively here:
            // proceed only if the issue already carries the identifying labels
            // or is a real template submission (exact title + full form body).
            // Stops a bare magic-titled issue from getting a validation comment.
            const currentIssueLabels = (context.payload.issue.labels || []).map((l) => l.name);
            const isProposal =
              (currentIssueLabels.includes('lfx mentorship') && currentIssueLabels.includes('Proposal'))
              || (isProposalTitle(title) && looksLikeProposalForm(body));
            if (!isProposal) {
              console.log('Not an LFX proposal (no identifying labels and body is not a proposal form); skipping validation.');
              return;
            }

            // ── Issue-form parser (lib/parse.js): splits on ### headings ──
            const fields = parseIssueForm(body);
            const get = (k) => (fields[k] || '').trim();

            const errors = [];
            const warnings = [];
            const passed = [];

            // ── 1. CNCF Project ──
            const project = get('CNCF Project');
            if (!project) {
              errors.push('CNCF Project is empty.');
            } else {
              passed.push(`CNCF Project: **${project}**`);
            }

            // ── 2. Term ──
            const term = get('Term');
            if (!term) {
              errors.push('Term is empty.');
            } else {
              passed.push(`Term: **${term}**`);
            }

            // ── 3. Program Name — length budget ──
            const programName = get('Program Name');
            if (!programName) {
              errors.push('Program Name is empty.');
            } else {
              // Budget: 100 - len("CNCF - ") - len(project) - len(": ") - len(" (") - len(term_token) - len(")")
              // term_token is e.g. "2026 Term 2" extracted from "2026 Term 2 (Jun-Aug)"
              const termToken = term.replace(/\s*\(.*$/, '');
              const overhead = 'CNCF - '.length + (project?.length || 0) + ': '.length + ' ('.length + termToken.length + ')'.length;
              const budget = 100 - overhead;
              if (programName.length > budget) {
                errors.push(
                  `Program Name is ${programName.length} chars but only ${budget} are available ` +
                  `(full name would be ${overhead + programName.length}/100 chars). Please shorten it.`
                );
              } else {
                passed.push(`Program Name length: ${programName.length}/${budget} chars available`);
              }
            }

            // ── 4. Program Description — 3000 char limit ──
            const description = get('Program Description');
            if (!description) {
              errors.push('Program Description is empty.');
            } else if (description.length > 3000) {
              errors.push(`Program Description is ${description.length} chars (LFX limit is 3000). Please trim ${description.length - 3000} chars.`);
            } else {
              passed.push(`Program Description: ${description.length}/3000 chars`);
            }

            // ── 5. Technologies ──
            const technologies = get('Technologies');
            if (!technologies) {
              errors.push('Technologies is empty.');
            } else {
              passed.push(`Technologies: ${technologies}`);
            }

            // ── 6. Skills consistency ──
            const skillsSameRaw = get('Skills same as Technologies?');
            const skillsSame = skillsSameRaw.includes('[X]') || skillsSameRaw.includes('[x]');
            const skills = get('Required/Desirable Skills');

            if (!skillsSame && !skills) {
              errors.push('Either check "Skills same as Technologies?" or fill in Required/Desirable Skills.');
            } else if (skillsSame && skills) {
              warnings.push('"Skills same as Technologies?" is checked but Required/Desirable Skills is also filled in. The export will use Technologies for both — clear one or the other.');
            } else {
              passed.push(skillsSame ? 'Skills: same as Technologies' : `Skills: ${skills}`);
            }

            // ── 7. Mentors — pipe-separated, one per line (decisions in lib/validate.js) ──
            const mentorsRaw = get('Mentors');
            const mentorResult = validateMentors(mentorsRaw);
            for (const e of mentorResult.errors) {
              switch (e.code) {
                case 'empty':
                  errors.push('Mentors field is empty. At least one mentor (primary) is required.');
                  break;
                case 'too-many':
                  errors.push(`Too many mentors: ${e.count} listed, but the maximum is 4 (primary plus up to 3 co-mentors). Please remove the extras.`);
                  break;
                case 'count':
                  errors.push(`${e.role}: expected 3 or 4 pipe-separated fields (Name | @handle | email | LFID), got ${e.got} in: \`${e.line}\``);
                  break;
                case 'name':
                  errors.push(`${e.role}: name is empty.`);
                  break;
                case 'handle':
                  errors.push(`${e.role}: handle \`${e.value}\` doesn't match \`@username\` format.`);
                  break;
                case 'email':
                  errors.push(`${e.role}: email \`${e.value}\` doesn't look valid.`);
                  break;
                case 'dup-handle':
                  errors.push(`${e.role}: duplicate handle \`${e.value}\`.`);
                  break;
                case 'dup-email':
                  errors.push(`${e.role}: duplicate email \`${e.value}\`.`);
                  break;
                case 'lfid-missing':
                  errors.push(`${e.role}: LFID (LF Username) is missing. You can add it later by editing this issue, but every mentor's LFID is required before the proposal can pass validation and be added to LFX.`);
                  break;
                case 'lfid-format':
                  errors.push(`${e.role}: LFID \`${e.value}\` doesn't look like an LF Username (no spaces, @, or URL; e.g. \`janedoe\`).`);
                  break;
                case 'dup-lfid':
                  errors.push(`${e.role}: duplicate LFID \`${e.value}\`.`);
                  break;
              }
            }
            if (mentorResult.ok) {
              const primaryName = parseMentors(mentorsRaw)[0].name;
              passed.push(`Mentors: ${mentorResult.count} listed (primary: ${primaryName})`);
            }

            // ── 7b. Mentor count preference (soft; decision in lib/validate.js) ──
            // Programs are encouraged to have at least two mentors; a lone
            // experienced mentor is acceptable, so this only warns. Passing the
            // whole result keeps the "skip when the field is invalid" decision
            // in the tested lib, not here.
            if (mentorCountWarning(mentorResult)) {
              warnings.push(
                'Only one mentor is listed. We usually prefer at least two mentors per program — ' +
                'if you can, consider adding a co-mentor.'
              );
            }

            // ── 8. Upstream Issue URL (decisions in lib/validate.js) ──
            const upstreamUrl = get('Upstream Issue URL');
            const upstreamErr = validateUpstreamUrl(upstreamUrl);
            if (upstreamErr === 'empty') {
              errors.push('Upstream Issue URL is empty.');
            } else if (upstreamErr === 'format') {
              errors.push(`Upstream Issue URL \`${upstreamUrl}\` is not a valid URL.`);
            } else if (upstreamErr === 'multiple') {
              errors.push('Upstream Issue URL should be exactly one URL. If the program spans multiple issues, create an umbrella issue.');
            } else {
              passed.push(`Upstream Issue URL: ${upstreamUrl}`);
            }

            // ── 9. Quota check ──
            if (project && term) {
              try {
                const quotaRaw = fs.readFileSync('programs/lfx-mentorship/automation/quotas.yml', 'utf8');
                // Simple YAML parse for our known format — no js-yaml needed
                const defaultMatch = quotaRaw.match(/default_per_project_per_term:\s*(\d+)/);
                const defaultQ = defaultMatch ? parseInt(defaultMatch[1]) : 5;
                const overrides = {};
                const overrideSection = quotaRaw.split(/^overrides:\s*$/m)[1];
                if (overrideSection) {
                  for (const m of overrideSection.matchAll(/^\s+([^:]+):\s*(\d+)/gm)) {
                    overrides[m[1].trim().toLowerCase()] = parseInt(m[2]);
                  }
                }
                // Build candidate keys: normalized NAME, GitHub org, and projects.yml
                // slug. quotas.yml may key a project by any of these; first match wins.
                const projectKeys = [project.toLowerCase().replace(/\s+/g, '-')];
                try {
                  const projYaml = fs.readFileSync('programs/lfx-mentorship/automation/projects.yml', 'utf8');
                  // GitHub org before projects.yml slug, to match the candidate
                  // ordering in lfx-proposal-approvals.yml (org preferred over slug).
                  const info = lookupProject(projYaml, project);
                  if (info) {
                    if (info.org) projectKeys.push(info.org.toLowerCase());
                    if (info.slug) projectKeys.push(info.slug);
                  }
                } catch (e) {
                  console.log(`projects.yml key lookup failed: ${e.message}`);
                }
                const quotaKeys = projectKeys.filter((v, i, a) => v && a.indexOf(v) === i);
                let quota = defaultQ;
                for (const key of quotaKeys) {
                  if (overrides[key] !== undefined) { quota = overrides[key]; break; }
                }

                // Count open proposals for same project + term
                const issues = await github.paginate(github.rest.issues.listForRepo, {
                  owner, repo, state: 'open', labels: `lfx mentorship,Proposal`,
                  per_page: 100,
                });

                const sameProjectTerm = issues.filter(iss => {
                  if (iss.number === issue_number) return false;
                  const b = iss.body || '';
                  return b.includes(`### CNCF Project\n\n${project}`)
                    && b.includes(`### Term\n\n${term}`);
                });

                const count = sameProjectTerm.length + 1; // include this one
                if (count > quota) {
                  warnings.push(
                    `**Over quota:** ${project} has ${count} proposals for ${term} ` +
                    `(limit: ${quota}). Existing proposals: ` +
                    sameProjectTerm.map(i => `#${i.number}`).join(', ') +
                    `. The project should decide which to keep.`
                  );
                } else {
                  passed.push(`Quota: ${count}/${quota} proposals for ${project} in ${term}`);
                }
              } catch (e) {
                warnings.push(`Could not check quota: ${e.message}`);
              }
            }

            // ── 10. LFX verification stub ──
            warnings.push(
              'LFX LFID/email verification is not yet automated. ' +
              'Please manually confirm mentor emails are registered on ' +
              'https://mentorship.lfx.linuxfoundation.org.'
            );

            // ── Proposer-implied approval / confirmation & edit invalidation ──
            // A proposal filed by a project maintainer implies their approval;
            // one filed by a listed mentor implies that mentor's confirmation.
            // Conversely, a MATERIAL edit (a parsed form field changed) after a
            // maintainer or CNCF approval invalidates it — the approved content
            // changed — so we clear it and tag whoever approved. Mentor
            // confirmation is a participation commitment and is NOT cleared by
            // content edits; only roster changes move the mentor gate.
            const currentLabels = (context.payload.issue.labels || []).map(l => l.name);
            const proposer = context.payload.issue.user?.login || '';

            // Material change: on an edit, did any parsed form field change
            // (whitespace-normalized)? Cosmetic edits (whitespace, a prepended
            // comment, text reflow) are not material, so re-triggering
            // validation won't reset anything. The issue TITLE is ignored — it
            // is auto-derived from body fields (`[CNCF LFX Proposal] <project>
            // <program>`), which are the source of truth, so a title-only edit
            // isn't a content change.
            const changes = context.payload.changes || {};
            const materialChange = context.payload.action === 'edited'
              && !!changes.body && formFieldsChanged(changes.body.from || '', body);

            let issueComments = [];
            try {
              issueComments = await github.paginate(github.rest.issues.listComments, {
                owner, repo, issue_number, per_page: 100,
              });
            } catch (e) {
              core.warning(`Could not read issue comments: ${e.message}`);
            }

            // Honor an existing maintainer approval only on a non-material edit;
            // a material edit forces it to be re-earned (proposer-implied below,
            // or a fresh /approve).
            let maintainerApproved = currentLabels.includes('Maintainer/Contribex Approved') && !materialChange;
            let mentorsConfirmed = currentLabels.includes('Mentors Confirmed');
            let maintainerAutoApproved = false;
            if (errors.length === 0) {
              // Maintainer gate: is the proposer a project maintainer?
              // Deliberately keyed off the PROPOSER, not the editor: a project
              // maintainer can only edit an issue when they are the OP, and the
              // only others with edit rights on this repo are trusted CNCF/TOC
              // collaborators — so keeping the proposer's approval across a
              // non-OP edit is acceptable and not an approval bypass.
              if (!maintainerApproved && proposer) {
                try {
                  const projYaml = fs.readFileSync('programs/lfx-mentorship/automation/projects.yml', 'utf8');
                  const info = lookupProject(projYaml, project) || {};
                  const r = await resolveProjectMaintainer({
                    handle: proposer, project, org: info.org, hasDotProject: info.hasDotProject,
                    fetchFn: fetch, log: (m) => console.log(m),
                  });
                  if (r.authorized) {
                    maintainerApproved = true;
                    maintainerAutoApproved = true;
                  }
                } catch (e) {
                  console.log(`proposer maintainer check failed: ${e.message}`);
                }
              }
              // Mentor gate: recompute from the CURRENT roster so adding an
              // unconfirmed mentor re-opens confirmation (and a removed/swapped
              // mentor resolves from persisted /confirm comments). Counts the
              // proposer's own slot. NOT monotonic — reflects the present roster.
              const roster = parseMentors(mentorsRaw).map(m => m.github_handle);
              mentorsConfirmed = computeConfirm(roster, null, issueComments, proposer).flip;
            }

            // ── Build validation comment ──
            const lines = ['## 🤖 LFX Proposal Validation', ''];

            if (errors.length === 0) {
              lines.push('✅ **All checks passed.**', '');
            } else {
              lines.push(`❌ **${errors.length} issue(s) found — please edit to fix:**`, '');
              for (const e of errors) lines.push(`- ${e}`);
              lines.push('');
            }

            if (warnings.length) {
              lines.push(`⚠️ **${warnings.length} warning(s):**`, '');
              for (const w of warnings) lines.push(`- ${w}`);
              lines.push('');
            }

            if (passed.length) {
              lines.push('<details><summary>✅ Passed checks</summary>', '');
              for (const p of passed) lines.push(`- ${p}`);
              lines.push('', '</details>');
            }

            if (errors.length === 0) {
              const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;
              const guideUrl = `${repoUrl}/blob/main/programs/lfx-mentorship/README.md#what-happens-after-you-submit`;
              lines.push('', '### What happens next', '');
              lines.push(
                (maintainerApproved && mentorsConfirmed)
                  ? 'Maintainer approval and mentor confirmation are already in place (the proposer is a project maintainer and/or listed mentor), so this proposal goes straight to final CNCF admin review.'
                  : 'This proposal is now waiting on the people below. No further action is needed from the proposer unless validation flags a change.',
                '',
              );
              lines.push(maintainerApproved
                ? `1. **Maintainer approval:** ✅ recorded${maintainerAutoApproved ? ` — proposer @${proposer} is a project maintainer` : ''}.`
                : '1. **Maintainer approval:** a maintainer of the CNCF project (or an authorized delegate) comments `/approve`.');
              lines.push(mentorsConfirmed
                ? '2. **Mentor confirmation:** ✅ recorded.'
                : '2. **Mentor confirmation:** each mentor listed on the proposal comments `/confirm`.');
              lines.push('3. **CNCF approval:** once both are in place, a CNCF mentorship admin comments `/cncf-approve` to finalize.');
              lines.push('', `See the [proposal process guide](${guideUrl}) for full details.`);
            }

            lines.push('', '---', '_Re-run by editing the issue._');
            const comment = lines.join('\n');

            // ── Upsert comment ──
            const marker = '## 🤖 LFX Proposal Validation';
            const prior = issueComments.find(c =>
              c.user?.login === 'github-actions[bot]' && c.body?.startsWith(marker)
            );
            if (prior) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: prior.id, body: comment });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: comment });
            }

            // ── Manage labels ──
            const pass = errors.length === 0;
            const addLabel = pass ? 'Validation Passed' : 'Validation Failed';
            const dropLabel = pass ? 'Validation Failed' : 'Validation Passed';

            if (currentLabels.includes(dropLabel)) {
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name: dropLabel }); } catch {}
            }
            if (!currentLabels.includes(addLabel)) {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [addLabel] });
            }
            if (currentLabels.includes('Needs Validation')) {
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name: 'Needs Validation' }); } catch {}
            }

            // ── Over Quota label ──
            const isOverQuota = warnings.some(w => w.startsWith('**Over quota:**'));
            if (isOverQuota && !currentLabels.includes('Over Quota')) {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['Over Quota'] });
            } else if (!isOverQuota && currentLabels.includes('Over Quota')) {
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name: 'Over Quota' }); } catch {}
            }

            // ── Approval / confirmation gates (decision in lib/gates.js) ──
            // Auto-satisfy the maintainer gate when the proposer is a project
            // maintainer, and the mentor gate when the current roster is fully
            // confirmed; otherwise set the awaiting labels. A material edit
            // clears the maintainer and CNCF approvals (content changed); when
            // both gates hold, signal the CNCF admin.
            const gate = gateLabelChanges({ pass, maintainerApproved, mentorsConfirmed, materialChange, currentLabels });
            for (const name of gate.remove) {
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name }); } catch {}
            }
            if (gate.add.length) {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: gate.add });
            }

            // ── Notify approvers when a material edit cleared their approval ──
            // Only on a material edit (the "edited after approval" message would
            // be misleading if CNCF was cleared by a gate regression instead).
            // Tag whoever recorded the maintainer / CNCF approval we cleared.
            const clearedMaintainer = gate.remove.includes('Maintainer/Contribex Approved');
            const clearedCncf = gate.remove.includes('CNCF Approved');
            if (materialChange && (clearedMaintainer || clearedCncf)) {
              const { maintainers, cncfAdmins } = findRecordedApprovers(issueComments);
              const toTag = [];
              if (clearedMaintainer) for (const h of maintainers) toTag.push(h);
              if (clearedCncf) for (const h of cncfAdmins) toTag.push(h);
              const mentions = [...new Set(toTag)].map(h => `@${h}`).join(' ');
              const what = [clearedMaintainer && 'maintainer approval', clearedCncf && 'CNCF admin approval']
                .filter(Boolean).join(' and ');
              await github.rest.issues.createComment({
                owner, repo, issue_number,
                body: `♻️ This proposal was edited after approval, so its ${what} ` +
                  `${clearedMaintainer && clearedCncf ? 'have' : 'has'} been cleared and must be granted again.` +
                  (mentions ? `\n\n${mentions} — please re-review the updated proposal.` : ''),
              });
            }

            // ── Term labels ──
            // Add year and term labels matching the selected term dropdown.
            // On edits that change the term, the old term label is removed.
            if (term) {
              const termMap = {
                'Term 1': 'Term 1: March-May',
                'Term 2': 'Term 2: June-Aug',
                'Term 3': 'Term 3: Sept-Nov',
              };
              const allTermLabels = Object.values(termMap);

              const yearMatch = term.match(/^(\d{4})/);
              const termNumMatch = term.match(/(Term \d)/);

              const wantYear = yearMatch ? yearMatch[1] : null;
              const wantTerm = termNumMatch ? termMap[termNumMatch[1]] : null;

              // Remove wrong term labels (handles edits that change the term)
              for (const tl of allTermLabels) {
                if (tl !== wantTerm && currentLabels.includes(tl)) {
                  try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name: tl }); } catch {}
                }
              }

              // Remove wrong year labels (handles edits that change the year)
              if (wantYear) {
                for (const cl of currentLabels) {
                  if (/^\d{4}$/.test(cl) && cl !== wantYear) {
                    try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name: cl }); } catch {}
                  }
                }
              }

              // Add correct labels
              const toAdd = [];
              if (wantYear && !currentLabels.includes(wantYear)) toAdd.push(wantYear);
              if (wantTerm && !currentLabels.includes(wantTerm)) toAdd.push(wantTerm);
              if (toAdd.length) {
                await github.rest.issues.addLabels({ owner, repo, issue_number, labels: toAdd });
              }
            }

      - name: Sync board status
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            // ── Resolve this repo's board from board.json (dev vs prod) ──
            // Only the projectId is stored per repo; the Status field ID and
            // option IDs are resolved live from the board so the fork (dev) and
            // cncf/mentoring (prod) run identical code. The board's Status
            // column names must match the lifecycle stages used below.
            const fs = require('fs');
            const path = require('path');
            const _lib = (m) => require(path.join(process.env.GITHUB_WORKSPACE || process.cwd(), 'programs/lfx-mentorship/automation/lib', m));
            const { determineStatus, shouldSkipSync, readStatusWithRetry } = _lib('board.js');
            const _board = JSON.parse(fs.readFileSync('programs/lfx-mentorship/automation/board.json', 'utf8'));
            const _envCfg = (_board.environments || {})[process.env.GITHUB_REPOSITORY];
            if (!_envCfg || !_envCfg.projectId || String(_envCfg.projectId).startsWith('REPLACE_')) {
              core.warning(`No board configured for ${process.env.GITHUB_REPOSITORY} in board.json; skipping board sync.`);
              return;
            }
            const PROJECT_ID = _envCfg.projectId;
            const _statusField = (await github.graphql(`
              query($projectId: ID!) {
                node(id: $projectId) { ... on ProjectV2 {
                  field(name: "Status") { ... on ProjectV2SingleSelectField { id options { id name } } }
                } }
              }
            `, { projectId: PROJECT_ID })).node.field;
            if (!_statusField) {
              core.warning(`Project ${PROJECT_ID} has no "Status" field; skipping board sync.`);
              return;
            }
            const STATUS_FIELD_ID = _statusField.id;
            const STATUS_OPTIONS = Object.fromEntries(_statusField.options.map(o => [o.name, o.id]));

            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const labels = issue.labels.map(l => l.name);

            if (!labels.includes('lfx mentorship') || !labels.includes('Proposal')) return;

            // Automation owns the lifecycle only through "Exported"; the
            // post-export columns are manual admin moves (see board guard below
            // and lib/board.js). This workflow never runs on close.
            const status = determineStatus(labels, null);

            const optionId = STATUS_OPTIONS[status];
            if (!optionId) {
              core.warning(`Board has no "${status}" status option; skipping board sync.`);
              return;
            }
            const addResult = await github.graphql(`
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                  item { id }
                }
              }
            `, { projectId: PROJECT_ID, contentId: issue.node_id });
            const itemId = addResult.addProjectV2ItemById.item.id;

            // ── Respect manual admin moves (guard logic in lib/board.js) ──
            // Automation owns the lifecycle only through "Exported"; the
            // post-export columns are advanced by hand by the administrator, so
            // never overwrite a card already sitting in one, and fail closed if
            // the status read fails while setting "Exported".
            const { currentStatus, readFailed } = await readStatusWithRetry(
              () => github.graphql(`
                query($itemId: ID!) {
                  node(id: $itemId) { ... on ProjectV2Item {
                    fieldValueByName(name: "Status") {
                      ... on ProjectV2ItemFieldSingleSelectValue { name }
                    }
                  } }
                }
              `, { itemId }),
              { onError: (attempt, e) => core.warning(`Could not read current board status (attempt ${attempt}/2): ${e.message}`) },
            );
            if (shouldSkipSync(currentStatus, status, readFailed)) {
              if (currentStatus) {
                console.log(`Card is in admin-owned column "${currentStatus}"; leaving placement to the administrator.`);
              } else {
                core.warning('Status read failed while about to set "Exported"; skipping to avoid clobbering a manual placement.');
              }
              return;
            }

            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId, itemId: $itemId, fieldId: $fieldId,
                  value: { singleSelectOptionId: $optionId }
                }) { projectV2Item { id } }
              }
            `, {
              projectId: PROJECT_ID,
              itemId: itemId,
              fieldId: STATUS_FIELD_ID,
              optionId: optionId,
            });
            console.log(`Board status → ${status}`);
