name: LFX Export Merge Notify

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  issues: write
  contents: write  # delete the merged export branch

jobs:
  notify:
    # Skip fork PRs: only same-repo export PRs should notify and delete branches.
    if: >-
      github.event.pull_request.merged == true
      && github.event.pull_request.head.repo.full_name == github.repository
      && startsWith(github.event.pull_request.head.ref, 'automation/lfx-export-')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Notify exported issues
        uses: actions/github-script@v7
        with:
          script: |
            const path = require('path');
            const _lib = (m) => require(path.join(process.env.GITHUB_WORKSPACE || process.cwd(), 'programs/lfx-mentorship/automation/lib', m));
            const { parseExportedIssueNumbers, exportPathForBranch, exportedIssueNumbers, newIssueNumbers } = _lib('notify.js');
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const prNumber = pr.number;

            const current = parseExportedIssueNumbers(pr.body);
            if (current.length === 0) {
              console.log('No linked issues found in PR body.');
              return;
            }

            // Notify only issues newly added by this export. Issues already in
            // the term export before this PR were notified when their export
            // merged, so re-exporting a term (e.g. to add one program) must not
            // re-notify them. Read the export at the PR base; a 404 means this
            // is the term's first export, so every issue is new.
            let previous = [];
            const exportPath = exportPathForBranch(pr.head.ref);
            if (exportPath) {
              try {
                const res = await github.rest.repos.getContent({ owner, repo, path: exportPath, ref: pr.base.sha });
                const parsed = JSON.parse(Buffer.from(res.data.content, 'base64').toString('utf8'));
                previous = exportedIssueNumbers(parsed);
              } catch (e) {
                if (e.status !== 404) throw e;
              }
            }

            const toNotify = newIssueNumbers(current, previous);
            if (toNotify.length === 0) {
              console.log('No newly-exported issues to notify.');
              return;
            }

            for (const issue_number of toNotify) {
              await github.rest.issues.createComment({
                owner, repo, issue_number,
                body: `✅ Export PR #${prNumber} has been merged. The program files are now on \`main\`.\n\n` +
                  `Once the program is created on LFX, an admin records its URL here with \`/lfx-url\`.`,
              });
              console.log(`Notified #${issue_number} about merge of PR #${prNumber}`);
            }

      - name: Delete merged export branch
        uses: actions/github-script@v7
        with:
          script: |
            const path = require('path');
            const _lib = (m) => require(path.join(process.env.GITHUB_WORKSPACE || process.cwd(), 'programs/lfx-mentorship/automation/lib', m));
            const { isExportBranch } = _lib('notify.js');
            const { owner, repo } = context.repo;
            const branch = context.payload.pull_request.head.ref;
            if (!isExportBranch(branch)) {
              console.log(`Not an export branch, skipping delete: ${branch}`);
              return;
            }
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: `heads/${branch}` });
              console.log(`Deleted merged export branch: ${branch}`);
            } catch (e) {
              console.log(`Could not delete branch ${branch}: ${e.message}`);
            }
