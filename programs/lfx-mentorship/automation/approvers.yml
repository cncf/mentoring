# Fallback approvers for projects whose governance model isn't fully
# captured by cncf/foundation/project-maintainers.csv or {org}/.project.
#
# The approvals workflow checks authorization in this order:
#   1. {org}/.project/maintainers.yaml (project-maintainers team)
#   2. cncf/foundation/project-maintainers.csv
#   3. This file — per-project fallback_teams and fallback_handles
#   4. This file — global_approvers (can /approve for any project)
#
# Format:
#   global_approvers:             # can /approve any project
#     - username
#
#   <project-slug>:               # must match the dropdown value in the issue form
#     fallback_teams:             # GitHub teams (org/team) whose members may /approve
#       - org/team-name
#     fallback_handles:           # individual GitHub handles
#       - username

global_approvers:
  - nate-double-u
  - dkrook
  - idvoretskyi
  - RobertKielty
  - thisisobate
  - Swil78
  - mlehotskylf

kubernetes:
  fallback_teams:
    - kubernetes/sig-contribex

open-telemetry:
  fallback_teams:
    - open-telemetry/governance-committee
  fallback_handles:
    - maryliag    # GC liaison for mentorship
